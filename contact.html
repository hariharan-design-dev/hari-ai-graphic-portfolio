<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Graphic Designer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            align-items: start;
            max-width: 1000px;
            margin: 0 auto;
        }

        .contact-info h3 {
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .contact-item {
            margin-bottom: 2rem;
        }

        .contact-item h4 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-item a {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .contact-item a:hover {
            color: var(--accent);
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .social-links a {
            font-size: 1.1rem;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        @media (max-width: 768px) {
            .contact-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="container nav-container">
            <a href="index.html" class="logo">DESIGNER.AI</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="projects.html">Projects</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="hero" style="min-height: 100vh; display: flex; align-items: center;">
        <div class="hero-bg-glow" style="top: 50%; right: 20%; transform: translate(50%, -50%);"></div>
        <div class="container fade-in" style="width: 100%;">
            
            <div style="text-align: center; margin-bottom: 4rem;">
                <h1 style="font-size: clamp(2.5rem, 5vw, 4rem);">Let’s Build Something Powerful</h1>
                <p style="max-width: 600px; margin: 1rem auto 0;">Open for freelance opportunities, collaborations, and full-time roles.</p>
            </div>

            <div class="contact-layout">
                <!-- Direct Info -->
                <div class="contact-info">
                    <div class="contact-item">
                        <h4>Direct Email</h4>
                        <a href="mailto:hello@designer.ai">hello@designer.ai</a>
                    </div>
                    
                    <div class="contact-item">
                        <h4>Location</h4>
                        <p style="color: var(--text-primary); font-size: 1.2rem; margin: 0;">Remote / Global</p>
                    </div>

                    <div class="contact-item">
                        <h4>Socials</h4>
                        <div class="social-links">
                            <a href="#" target="_blank">LinkedIn</a>
                            <a href="#" target="_blank">Twitter/X</a>
                            <a href="#" target="_blank">Instagram</a>
                            <a href="#" target="_blank">Behance</a>
                        </div>
                    </div>
                </div>

                <!-- Form -->
                <div class="card" style="padding: 2.5rem;">
                    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Form submitted successfully!');">
                        <div class="form-group">
                            <label for="name" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Name</label>
                            <input type="text" id="name" class="form-control" required placeholder="John Doe">
                        </div>
                        
                        <div class="form-group">
                            <label for="email" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Email</label>
                            <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                        </div>
                        
                        <div class="form-group">
                            <label for="subject" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Subject</label>
                            <input type="text" id="subject" class="form-control" required placeholder="Project Inquiry">
                        </div>

                        <div class="form-group">
                            <label for="message" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Message</label>
                            <textarea id="message" class="form-control" required placeholder="Tell me about your project..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
